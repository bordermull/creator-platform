services:
  postgres:
    image: postgres:16-alpine
    container_name: creatur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: creatur
      POSTGRES_USER: creatur
      POSTGRES_PASSWORD: creatur
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatur -d creatur"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - creatur-postgres-data:/var/lib/postgresql/data

volumes:
  creatur-postgres-data:
