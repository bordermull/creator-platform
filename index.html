<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CREATUR</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="header" data-header>
        <a class="logo" href="#home" aria-label="CREATUR на главную">
          <img src="./assets/logo.svg" alt="CREATUR" />
        </a>
        <nav class="nav" aria-label="Основная навигация">
          <a href="#home">ИИ-креаторы</a>
          <a href="#home">3D-креаторы</a>
          <a href="#profile">Дизайнеры</a>
          <a href="#home">Программисты</a>
        </nav>
        <div class="header-actions" data-auth-actions></div>
        <button class="menu-button" type="button" data-menu-button aria-label="Открыть меню">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </header>

      <main id="app"></main>

      <footer class="footer">
        <a class="logo" href="#home" aria-label="CREATUR на главную">
          <img src="./assets/logo.svg" alt="CREATUR" />
        </a>
        <nav aria-label="Контакты">
          <a href="#home">Наши контакты</a>
          <a href="#home">Telegram</a>
          <a href="#home">Вконтакте</a>
        </nav>
        <p>© CREATUR TEAM. Все права защищены.</p>
      </footer>
    </div>

    <template id="home-template">
      <section class="home-screen" data-home-screen>
        <div class="home-intro">
          <div class="hero-copy">
            <h1 class="hero-title" aria-label="Стань частью великой эволюции">
              <span class="accent-line">Стань</span>
              <span>частью</span>
              <span class="accent-line">великой</span>
              <span>эволюции</span>
            </h1>
            <p class="hero-text">Единая платформа для размещения работ авторов <br />из разных сфер со всего мира!</p>
          </div>
        </div>

        <div class="catalog-toolbar">
          <button class="filter-toggle" type="button" data-filter-toggle>Фильтры</button>
          <label class="search">
            <span aria-hidden="true">⌕</span>
            <input type="search" data-search placeholder="Запросы сюда! :3" />
          </label>
          <button class="primary-button upload-shortcut" type="button" data-upload-shortcut>Загрузить проект</button>
        </div>

        <div class="catalog-layout">
          <section class="catalog" aria-label="Галерея проектов">
            <div class="cards-grid" data-project-grid></div>
          </section>
        </div>

        <div class="filters-overlay" data-filters-overlay hidden>
          <aside class="filters-panel" data-filters role="dialog" aria-modal="true" aria-label="Фильтры каталога">
            <div class="filters-head">
              <h2>Фильтры</h2>
              <button class="filter-close" type="button" data-close-filters aria-label="Закрыть фильтры">×</button>
            </div>
            <div class="filter-group" data-filter-group="section">
              <p class="filter-title">Раздел</p>
              <label><input type="checkbox" value="ai" checked /> ИИ-креаторы</label>
              <label><input type="checkbox" value="3D" checked /> 3D-креаторы</label>
              <label><input type="checkbox" value="design" checked /> Дизайнеры</label>
              <label><input type="checkbox" value="code" /> Программисты</label>
            </div>
            <div class="filter-group" data-filter-group="tools">
              <p class="filter-title">Инструменты</p>
              <label><input type="checkbox" value="Blender" /> Blender</label>
              <label><input type="checkbox" value="ProCreate" /> ProCreate</label>
              <label><input type="checkbox" value="Unreal" /> Unreal Engine</label>
              <label><input type="checkbox" value="Unity" /> Unity</label>
            </div>
            <div class="filter-group" data-filter-group="themes">
              <p class="filter-title">Тематика</p>
              <label><input type="checkbox" value="fantasy" /> Fantasy</label>
              <label><input type="checkbox" value="sci-fi" /> Sci-fi</label>
              <label><input type="checkbox" value="game" /> Game art</label>
              <label><input type="checkbox" value="concept" /> Концепт</label>
            </div>
            <div class="filters-actions">
              <button class="ghost-button" type="button" data-clear-filters>Сбросить</button>
              <button class="primary-button full" type="button" data-apply-filters>Применить</button>
            </div>
          </aside>
        </div>
      </section>
    </template>

    <template id="auth-modal-template">
      <div class="modal-backdrop" data-modal-backdrop>
        <section class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-title">
          <button class="modal-close" type="button" data-close-modal aria-label="Закрыть">×</button>
          <form class="auth-card" data-auth-form novalidate>
            <h1 id="auth-title" data-auth-title>Вход</h1>
            <p data-auth-subtitle>Нет аккаунта? <button type="button" data-switch-auth="register">Создать профиль</button></p>
            <div class="field">
              <label for="email">Адрес электронной почты</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="password">Пароль</label>
              <input id="password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <p class="form-error" data-form-error></p>
            <button class="primary-button full" type="submit" data-auth-submit>Продолжить</button>
          </form>
          <div class="auth-brand">
            <div class="logo logo-big" aria-label="CREATUR">
              <img src="./assets/logo.svg" alt="" />
            </div>
            <h2>Искусство начинается</h2>
          </div>
        </section>
      </div>
    </template>

    <template id="profile-template">
      <section class="profile-hero">
        <div class="profile-cover">
          <img src="./assets/extracted/user-profile/image-01.png" alt="" />
        </div>
        <div class="profile-info">
          <img class="avatar image-avatar" src="./assets/extracted/home-after-registration/image-01.png" alt="Аватар Виктора" />
          <div>
            <h1>Виктор Жестянщиков</h1>
            <p>3D-художник, концепт-дизайнер, автор игровых объектов.</p>
          </div>
          <dl>
            <div><dt>Работ</dt><dd>28</dd></div>
            <div><dt>Подписчиков</dt><dd>1 742</dd></div>
            <div><dt>Лайков</dt><dd>9 817</dd></div>
          </dl>
        </div>
      </section>
      <section class="catalog profile-catalog">
        <h2>Проекты автора</h2>
        <div class="cards-grid" data-profile-grid></div>
      </section>
    </template>

    <template id="account-template">
      <section class="account-screen" data-account-screen>
        <aside class="account-sidebar">
          <div class="account-avatar">
            <img src="./assets/extracted/account-edit/image-01.png" alt="Аватар пользователя" />
            <button class="icon-action" type="button" data-edit-account aria-label="Редактировать профиль">✎</button>
          </div>

          <div class="account-summary" data-account-view>
            <h1>Ваш профиль</h1>
            <p>Добавьте описание, чтобы другие авторы быстрее понимали ваш стиль и опыт.</p>
          </div>

          <form class="account-form" data-account-form hidden>
            <div class="field">
              <label for="account-name">Имя профиля</label>
              <input id="account-name" value="Виктор Жестянщиков" />
            </div>
            <div class="field">
              <label for="account-about">Описание</label>
              <textarea id="account-about" rows="5">3D-художник, концепт-дизайнер, автор игровых объектов.</textarea>
            </div>
          </form>

          <dl class="account-stats">
            <div><dt>Работ</dt><dd>0</dd></div>
            <div><dt>Подписчиков</dt><dd>14</dd></div>
            <div><dt>Лайков</dt><dd>0</dd></div>
          </dl>

          <div class="account-actions">
            <button class="primary-button full" type="button" data-account-primary>Загрузить проект</button>
            <button class="ghost-button full" type="button" data-account-secondary>Редактировать</button>
          </div>
        </aside>

        <section class="account-workspace">
          <div class="account-empty-state" data-account-empty>
            <div class="empty-mark">+</div>
            <h2>Здесь будут ваши проекты</h2>
            <p>Загрузите первую работу, заполните карточку проекта и покажите ее в общей галерее.</p>
            <button class="primary-button" type="button" data-account-upload>Добавить проект</button>
          </div>

          <div class="account-edit-preview" data-account-preview hidden>
            <div class="section-head">
              <div>
                <p class="eyebrow">Предпросмотр профиля</p>
                <h2>Так кабинет увидят после сохранения</h2>
              </div>
              <button class="primary-button" type="button" data-save-account>Сохранить</button>
            </div>
            <div class="cards-grid compact-grid">
              <a class="project-card" href="#project/iron-gloves">
                <div class="project-art">
                  <img src="./assets/extracted/account-edit/image-02.png" alt="Концепт перчаток для силы" />
                </div>
                <div class="card-body">
                  <img class="mini-avatar" src="./assets/extracted/account-edit/image-01.png" alt="" />
                  <div class="card-content">
                    <h3>Концепт перчаток для силы</h3>
                    <p>Виктор Жестянщиков</p>
                    <div class="tag-row"><span>3D</span><span>Blender</span><span>Game art</span></div>
                    <div class="meta-row"><span>Черновик</span><span>0 лайков</span></div>
                  </div>
                </div>
              </a>
            </div>
          </div>
        </section>
      </section>
    </template>

    <template id="upload-template">
      <section class="upload-screen" data-upload-screen>
        <div class="upload-workspace">
          <button class="upload-drop" type="button" data-upload-drop>
            <img data-upload-image src="./assets/extracted/project-upload-empty/image-01.png" alt="" />
            <span class="upload-plus" aria-hidden="true">+</span>
            <span class="upload-drop-copy" data-upload-copy>Загрузите обложку проекта</span>
          </button>

          <div class="upload-preview-strip" aria-label="Кадры проекта">
            <button class="preview-arrow" type="button" aria-label="Предыдущий кадр">‹</button>
            <button class="preview-tile active" type="button" data-upload-fill>
              <span></span>
            </button>
            <button class="preview-tile" type="button" data-upload-fill>
              <span></span>
            </button>
            <button class="preview-arrow" type="button" aria-label="Следующий кадр">›</button>
          </div>
        </div>

        <form class="upload-form" data-upload-form>
          <div class="field">
            <label for="project-title">Название</label>
            <input id="project-title" name="title" data-upload-title placeholder="Название проекта" />
          </div>
          <div class="field">
            <label for="project-desc">Описание</label>
            <textarea id="project-desc" name="description" data-upload-desc rows="5" placeholder="Расскажите о проекте, инструментах и идее"></textarea>
          </div>
          <div class="field">
            <label>Теги</label>
            <div class="tag-cloud" aria-label="Теги проекта">
              <button type="button" data-tag="3D">3D</button>
              <button type="button" data-tag="Blender">Blender</button>
              <button type="button" data-tag="Game art">Game art</button>
              <button type="button" data-tag="Sci-fi">Sci-fi</button>
              <button type="button" data-tag="Concept">Concept</button>
              <button type="button" data-tag="Motion">Motion</button>
            </div>
          </div>
          <div class="upload-actions">
            <button class="ghost-button" type="button" data-upload-reset>Очистить</button>
            <button class="primary-button full" type="submit">Опубликовать</button>
          </div>
          <p class="upload-status" data-upload-status aria-live="polite"></p>
        </form>
      </section>
    </template>

    <template id="project-template">
      <section class="project-page" data-project-page></section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
